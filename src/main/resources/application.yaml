spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/financas_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  error:
    include-message: always